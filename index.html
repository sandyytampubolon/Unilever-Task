<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager Sidebar</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 15px; font-size: 14px; }
        .card { border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .task-item { border-left: 5px solid #6c757d; margin-bottom: 10px; padding: 10px; background: white; border-radius: 5px; }
        .status-done { border-left-color: #198754; background-color: #effff7; }
        .status-pending { border-left-color: #ffc107; }
    </style>
</head>
<body>
    <div class="card p-3">
        <h6>Tambah Tugas Baru</h6>
        <input type="text" id="tugas" class="form-control form-control-sm mb-2" placeholder="Nama Tugas">
        <input type="date" id="deadline" class="form-control form-control-sm mb-2">
        <button onclick="addTask()" class="btn btn-primary btn-sm w-100">Tambah ke Excel</button>
    </div>

    <h6>Daftar Tugas (Live dari Excel)</h6>
    <button onclick="loadTasks()" class="btn btn-outline-secondary btn-sm mb-3 w-100">🔄 Refresh Daftar</button>
    
    <div id="taskList">
        </div>

<script>
    // Pastikan Office.js siap sebelum melakukan apa pun
    Office.onReady((info) => {
        if (info.host === Office.HostType.Excel) {
            console.log("Office.js siap di Excel.");
            // Aktifkan tombol setelah Office siap
            document.getElementById('btnTambah').disabled = false;
            document.getElementById('btnRefresh').disabled = false;
            loadTasks(); 
        }
    });

    async function addTask() {
        const tugas = document.getElementById('tugas').value;
        const deadline = document.getElementById('deadline').value;

        if (!tugas || !deadline) return alert("Isi data dulu!");

        try {
            await Excel.run(async (context) => {
                const sheet = context.workbook.worksheets.getActiveWorksheet();
                const table = sheet.tables.getItem("TabelTugas");
                
                table.rows.add(null, [[tugas, deadline, "Belum Selesai"]]);
                
                await context.sync();
                document.getElementById('tugas').value = '';
                loadTasks(); 
            });
        } catch (error) {
            console.error(error);
            alert("Gagal menambah data. Pastikan tabel bernama 'TabelTugas' sudah ada.");
        }
    }

    async function loadTasks() {
        const taskListDiv = document.getElementById('taskList');
        taskListDiv.innerHTML = '<p class="text-center">Memuat data...</p>';

        try {
            await Excel.run(async (context) => {
                const table = context.workbook.worksheets.getActiveWorksheet().tables.getItem("TabelTugas");
                const range = table.getDataBodyRange();
                range.load("values");

                await context.sync();
                const rows = range.values;
                taskListDiv.innerHTML = '';

                rows.forEach((row) => {
                    const isDone = row[2] === "Selesai";
                    const itemClass = isDone ? "status-done" : "status-pending";
                    const badgeClass = isDone ? "bg-success" : "bg-warning text-dark";

                    taskListDiv.innerHTML += `
                        <div class="task-item ${itemClass}">
                            <strong>${row[0]}</strong><br>
                            <small class="text-muted">📅 ${row[1]}</small><br>
                            <span class="badge ${badgeClass}">${row[2]}</span>
                        </div>
                    `;
                });
            });
        } catch (err) {
            taskListDiv.innerHTML = '<p class="text-danger">Tabel "TabelTugas" tidak ditemukan atau kosong.</p>';
        }
    }
</script>
</body>
</html>
