<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Tugas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card p-4 mb-4">
                <h3 class="mb-4">Tambah Tugas Baru</h3>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="tugas" class="form-control" placeholder="Nama Tugas">
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="deadline" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <button onclick="simpanData()" id="btnSimpan" class="btn btn-primary w-100">Simpan Ke Sheet</button>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Daftar Tugas</h3>
                    <button onclick="ambilData()" class="btn btn-outline-secondary btn-sm">🔄 Segarkan</button>
                </div>
                <div id="status"></div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Tugas</th>
                                <th>Deadline</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN API URL DARI SHEETDB DI SINI
    const API_URL = "https://sheetdb.io/api/v1/gjshtdyt6kx3h";

    // 1. Fungsi Ambil Data (Tampil)
    async function ambilData() {
        const tabel = document.getElementById('tabelBody');
        tabel.innerHTML = "<tr><td colspan='3' class='text-center'>Memuat data...</td></tr>";
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            tabel.innerHTML = "";
            data.forEach(item => {
                tabel.innerHTML += `
                    <tr>
                        <td>${item.Tugas}</td>
                        <td>${item.Deadline}</td>
                        <td><span class="badge bg-success">${item.Status || 'Pending'}</span></td>
                    </tr>
                `;
            });
        } catch (err) {
            tabel.innerHTML = "<tr><td colspan='3' class='text-center text-danger'>Gagal memuat data</td></tr>";
        }
    }

    // 2. Fungsi Simpan Data (Tambah)
    async function simpanData() {
        const tugas = document.getElementById('tugas').value;
        const deadline = document.getElementById('deadline').value;
        const btn = document.getElementById('btnSimpan');

        if(!tugas || !deadline) return alert("Isi semua kolom!");

        btn.disabled = true;
        btn.innerText = "Menyimpan...";

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    data: [
                        {
                            "Tugas": tugas,
                            "Deadline": deadline,
                            "Status": "Pending"
                        }
                    ]
                })
            });

            if(res.ok) {
                document.getElementById('tugas').value = "";
                ambilData(); // Refresh list otomatis
            }
        } catch (err) {
            alert("Gagal menyimpan ke server!");
        } finally {
            btn.disabled = false;
            btn.innerText = "Simpan Ke Sheet";
        }
    }

    // Jalankan ambil data saat halaman dibuka
    ambilData();
</script>

</body>
</html>
